<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lunch App</title>
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f5f5f5;
            color: #333;
            padding: 1rem;
            max-width: 480px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        header h1 {
            font-size: 1.25rem;
        }

        .logout-btn {
            font-size: 0.875rem;
            color: #4f46e5;
            background: none;
            border: none;
            cursor: pointer;
            padding: 0.375rem 0.75rem;
            border-radius: 6px;
            transition: background 0.15s;
        }

        .logout-btn:hover {
            background: rgba(79, 70, 229, 0.08);
        }

        .card {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
            padding: 1.25rem;
            margin-bottom: 1rem;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            padding: 0.5rem 0;
        }

        .stat-row + .stat-row {
            border-top: 1px solid #f0f0f0;
        }

        .stat-label {
            font-size: 0.875rem;
            color: #666;
        }

        .stat-value {
            font-size: 1.125rem;
            font-weight: 600;
        }

        .stat-row.highlight {
            padding-top: 0.75rem;
            margin-top: 0.25rem;
            border-top: 2px solid #e5e5e5;
        }

        .saving {
            color: #16a34a;
        }

        .overpaying {
            color: #dc2626;
        }

        .neutral {
            color: #666;
        }

        .empty-state {
            text-align: center;
            padding: 2rem 1rem;
            color: #999;
            font-size: 0.9375rem;
        }

        .lunch-count {
            font-size: 0.8125rem;
            color: #999;
            text-align: center;
            margin-top: 0.5rem;
        }

        .action-btn {
            display: block;
            width: 100%;
            padding: 0.75rem;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 500;
            text-align: center;
            text-decoration: none;
            cursor: pointer;
            transition: background 0.15s;
        }

        .action-btn + .action-btn {
            margin-top: 0.625rem;
        }

        .btn-primary {
            background: #4f46e5;
            color: #fff;
            margin-top: 1.25rem;
        }

        .btn-primary:hover {
            background: #4338ca;
        }

        .btn-primary:active {
            background: #3730a3;
        }

        .btn-secondary {
            background: #e5e5e5;
            color: #333;
        }

        .btn-secondary:hover {
            background: #d4d4d4;
        }

        .btn-secondary:active {
            background: #c4c4c4;
        }
    </style>
</head>
<body>
    <header>
        <h1>Lunch App</h1>
        <form th:action="@{/logout}" method="post" style="display:inline">
            <button type="submit" class="logout-btn">Log out</button>
        </form>
    </header>

    <div th:if="${stats.lunchCount == 0}" class="card empty-state">
        No lunches recorded yet.
    </div>

    <div th:if="${stats.lunchCount > 0}" class="card">
        <div class="stat-row">
            <span class="stat-label">Total meal price</span>
            <span class="stat-value" th:text="${#numbers.formatDecimal(stats.totalMealPrice, 1, 2)}"></span>
        </div>

        <div class="stat-row">
            <span class="stat-label">Total paid</span>
            <span class="stat-value" th:text="${#numbers.formatDecimal(stats.totalAmountPaid, 1, 2)}"></span>
        </div>

        <div class="stat-row highlight">
            <span class="stat-label">
                <span th:if="${stats.saving}">You saved</span>
                <span th:if="${stats.overpaying}">You overpaid</span>
                <span th:if="${!stats.saving and !stats.overpaying}">Difference</span>
            </span>
            <span class="stat-value"
                  th:classappend="${stats.saving} ? 'saving' : (${stats.overpaying} ? 'overpaying' : 'neutral')"
                  th:text="${#numbers.formatDecimal(stats.difference.abs(), 1, 2) + ' (' + #numbers.formatDecimal(stats.differencePercent.abs(), 1, 1) + '%)'}"
            ></span>
        </div>
    </div>

    <div th:if="${stats.lunchCount > 0}" class="lunch-count">
        Based on <span th:text="${stats.lunchCount}"></span> lunch(es)
    </div>

    <a th:href="@{/lunch/new}" class="action-btn btn-primary">Add lunch</a>
    <a th:href="@{/lunch/history}" class="action-btn btn-secondary">Lunch history</a>
</body>
</html>
