<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Lunch</title>
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f5f5f5;
            color: #333;
            padding: 1rem;
            max-width: 480px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        header h1 {
            font-size: 1.25rem;
        }

        .card {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
            padding: 1.5rem;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            color: #555;
            margin-bottom: 0.25rem;
        }

        input[type="date"],
        input[type="number"] {
            width: 100%;
            padding: 0.625rem 0.75rem;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.15s;
            -webkit-appearance: none;
        }

        input:focus {
            outline: none;
            border-color: #4f46e5;
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }

        .btn-group {
            display: flex;
            gap: 0.75rem;
            margin-top: 1.5rem;
        }

        .btn {
            flex: 1;
            padding: 0.75rem;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
            transition: background 0.15s;
        }

        .btn-primary {
            background: #4f46e5;
            color: #fff;
        }

        .btn-primary:hover {
            background: #4338ca;
        }

        .btn-primary:active {
            background: #3730a3;
        }

        .btn-secondary {
            background: #e5e5e5;
            color: #333;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-secondary:hover {
            background: #d4d4d4;
        }

        .btn-secondary:active {
            background: #c4c4c4;
        }
    </style>
</head>
<body>
    <header>
        <h1>Add Lunch</h1>
    </header>

    <div class="card">
        <form th:action="@{/lunch}" th:object="${lunchForm}" method="post">
            <div class="form-group">
                <label for="date">Date</label>
                <input type="date" id="date" name="date" th:value="${#temporals.format(lunchForm.date, 'yyyy-MM-dd')}" required>
            </div>

            <div class="form-group">
                <label for="mealPrice">Meal price</label>
                <input type="number" id="mealPrice" th:field="*{mealPrice}" step="0.01" min="0" inputmode="decimal" required>
            </div>

            <div class="form-group">
                <label for="amountPaid">Amount paid</label>
                <input type="number" id="amountPaid" th:field="*{amountPaid}" step="0.01" min="0" inputmode="decimal" required>
            </div>

            <div class="btn-group">
                <a th:href="@{/}" class="btn btn-secondary">Cancel</a>
                <button type="submit" class="btn btn-primary">Save</button>
            </div>
        </form>
    </div>
</body>
</html>
