<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lunch History</title>
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f5f5f5;
            color: #333;
            padding: 1rem;
            max-width: 480px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        header h1 {
            font-size: 1.25rem;
        }

        .back-link {
            font-size: 0.875rem;
            color: #4f46e5;
            text-decoration: none;
            padding: 0.375rem 0.75rem;
            border-radius: 6px;
            transition: background 0.15s;
        }

        .back-link:hover {
            background: rgba(79, 70, 229, 0.08);
        }

        .card {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
            padding: 1.25rem;
            margin-bottom: 1rem;
        }

        .empty-state {
            text-align: center;
            padding: 2rem 1rem;
            color: #999;
            font-size: 0.9375rem;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.875rem;
        }

        th {
            text-align: left;
            font-weight: 600;
            color: #666;
            padding: 0.5rem 0.5rem;
            border-bottom: 2px solid #e5e5e5;
        }

        th:not(:first-child) {
            text-align: right;
        }

        td {
            padding: 0.625rem 0.5rem;
            border-bottom: 1px solid #f0f0f0;
        }

        td:not(:first-child) {
            text-align: right;
        }

        tr:last-child td {
            border-bottom: none;
        }
    </style>
</head>
<body>
    <header>
        <h1>Lunch History</h1>
        <a th:href="@{/}" class="back-link">Back</a>
    </header>

    <div th:if="${#lists.isEmpty(lunches)}" class="card empty-state">
        No lunches recorded yet.
    </div>

    <div th:if="${!#lists.isEmpty(lunches)}" class="card">
        <table>
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Meal price</th>
                    <th>Paid</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="lunch : ${lunches}">
                    <td th:text="${#temporals.format(lunch.date, 'dd.MM.yyyy')}"></td>
                    <td th:text="${#numbers.formatDecimal(lunch.mealPrice, 1, 2)}"></td>
                    <td th:text="${#numbers.formatDecimal(lunch.amountPaid, 1, 2)}"></td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
